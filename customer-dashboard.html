<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - LocalBiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="toast.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        .cart-badge-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.5rem;
        }
        .cart-count-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e53e3e;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .product-card:hover {
            transform: translateY(-4px);
        }
    </style>
</head>
<body class="dashboard-body">
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <div class="sidebar-header">
                <div class="logo">LocalBiz</div>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-text">Home</span>
                </a>
                <a href="customer-dashboard.html" class="nav-item active">
                    <span class="nav-icon">🛍️</span>
                    <span class="nav-text">Shop Products</span>
                </a>
                <a href="order-history.html" class="nav-item">
                    <span class="nav-icon">📦</span>
                    <span class="nav-text">My Orders</span>
                </a>
                <a href="#" onclick="openCart(); return false;" class="nav-item">
                    <span class="nav-icon">🛒</span>
                    <span class="nav-text">My Cart</span>
                    <span class="cart-count-badge" id="sidebarCartCount" style="position: static; margin-left: auto;">0</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar" id="userAvatar">C</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Customer</div>
                        <div class="user-role">Customer</div>
                    </div>
                </div>
                <a href="#" class="logout-btn" onclick="logout(); return false;">← Logout</a>
            </div>
        </aside>

        <main class="dashboard-main">
            <header class="dashboard-header">
                <div class="header-content">
                    <div class="header-title">
                        <h1>Shop Products</h1>
                        <p>Browse and purchase products from local businesses</p>
                    </div>
                    <div class="header-actions">
                        <div class="cart-badge-icon" onclick="openCart()" style="cursor: pointer; padding: 0.5rem 1rem; background: #f7fafc; border-radius: 8px;">
                            <span style="font-size: 1.5rem;">🛒</span>
                            <span class="cart-count-badge" id="cartCount">0</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <div style="display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;">
                    <input type="search" id="searchProducts" placeholder="Search products..." style="flex: 1; min-width: 250px; padding: 0.75rem 1rem; border: 2px solid #e2e8f0; border-radius: 8px;">
                    <select id="businessFilter" style="padding: 0.75rem 1rem; border: 2px solid #e2e8f0; border-radius: 8px;">
                        <option value="">All Businesses</option>
                    </select>
                    <select id="categoryFilter" style="padding: 0.75rem 1rem; border: 2px solid #e2e8f0; border-radius: 8px;">
                        <option value="">All Categories</option>
                    </select>
                    <button onclick="toggleAdvancedFilters()" class="btn btn-outline" style="padding: 0.75rem 1rem;">
                        🔍 Filters
                    </button>
                </div>

                <!-- Advanced Filters -->
                <div id="advancedFilters" style="display: none; background: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border: 1px solid #e2e8f0;">
                    <h3 style="margin-bottom: 1rem; font-size: 1.125rem;">Advanced Filters</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                        <div>
                            <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.875rem;">Min Price</label>
                            <input type="number" id="minPrice" placeholder="₹0" style="width: 100%; padding: 0.625rem; border: 1.5px solid #d4d4d4; border-radius: 0.75rem;">
                        </div>
                        <div>
                            <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.875rem;">Max Price</label>
                            <input type="number" id="maxPrice" placeholder="₹10000" style="width: 100%; padding: 0.625rem; border: 1.5px solid #d4d4d4; border-radius: 0.75rem;">
                        </div>
                        <div>
                            <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.875rem;">Sort By</label>
                            <select id="sortSelect" style="width: 100%; padding: 0.625rem; border: 1.5px solid #d4d4d4; border-radius: 0.75rem;">
                                <option value="default">Default</option>
                                <option value="price-low">Price: Low to High</option>
                                <option value="price-high">Price: High to Low</option>
                                <option value="name">Name: A to Z</option>
                            </select>
                        </div>
                        <div>
                            <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.875rem;">Availability</label>
                            <select id="stockFilter" style="width: 100%; padding: 0.625rem; border: 1.5px solid #d4d4d4; border-radius: 0.75rem;">
                                <option value="">All Products</option>
                                <option value="in-stock">In Stock Only</option>
                                <option value="out-of-stock">Out of Stock</option>
                            </select>
                        </div>
                    </div>
                    <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
                        <button onclick="applyFilters()" class="btn btn-primary">Apply Filters</button>
                        <button onclick="clearFilters()" class="btn btn-outline">Clear All</button>
                    </div>
                </div>

                <div style="margin-bottom: 1rem;">
                    <p style="color: #718096;" id="productCount">Loading...</p>
                </div>

                <div id="productsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;">
                    <div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                        <div class="spinner spinner-large"></div>
                        <p style="color: #718096; margin-top: 1rem;">Loading products...</p>
                    </div>
                </div>

                <!-- Pagination -->
                <div id="pagination" style="display: flex; justify-content: center; align-items: center; gap: 0.5rem; margin-top: 2rem;"></div>
            </div>
        </main>
    </div>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 style="margin: 0;">Shopping Cart</h2>
                <button onclick="closeCart()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">×</button>
            </div>
            <div id="cartItems"></div>
            <div style="border-top: 2px solid #e2e8f0; padding-top: 1rem; margin-top: 1rem;">
                <div style="display: flex; justify-content: space-between; font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem;">
                    <span>Total:</span>
                    <span id="cartTotal">₹0</span>
                </div>
                <button onclick="checkout()" class="btn btn-primary" style="width: 100%;">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/errorHandler.js"></script>
    <script>
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let allProducts = [];
        let currentPage = 1;
        let totalPages = 1;

        const user = checkAuth();
        if (!user) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('userName').textContent = user.fullName || user.email;
            const initials = user.fullName ? user.fullName.split(' ').map(n => n[0]).join('').toUpperCase() : user.email[0].toUpperCase();
            document.getElementById('userAvatar').textContent = initials;
            loadProducts();
            loadBusinesses();
            updateCartCount();
        }

        async function loadProducts(page = 1) {
            try {
                console.log('Fetching products from backend...');
                const response = await fetch(`http://localhost:5000/api/products?page=${page}&limit=12`);
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                allProducts = data.products;
                currentPage = data.pagination.page;
                totalPages = data.pagination.pages;
                
                console.log('Loaded products:', allProducts);
                console.log('Total products:', data.pagination.total);
                
                if (allProducts.length === 0) {
                    console.warn('No products found in database');
                }
                
                displayProducts(allProducts);
                renderPagination();
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('productsGrid').innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #e53e3e;">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">⚠️</div>
                        <p>Failed to load products</p>
                        <p style="font-size: 0.875rem; color: #718096; margin-top: 0.5rem;">Error: ${error.message}</p>
                        <p style="font-size: 0.875rem; color: #718096;">Make sure the backend server is running on http://localhost:5000</p>
                        <button onclick="loadProducts()" class="btn btn-primary" style="margin-top: 1rem;">Retry</button>
                    </div>
                `;
            }
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            
            // Previous button
            html += `<button onclick="loadProducts(${currentPage - 1})" class="btn btn-outline" style="padding: 0.5rem 1rem;" ${currentPage === 1 ? 'disabled' : ''}>← Previous</button>`;
            
            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `<button onclick="loadProducts(${i})" class="btn ${i === currentPage ? 'btn-primary' : 'btn-outline'}" style="padding: 0.5rem 1rem;">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<span style="padding: 0.5rem;">...</span>`;
                }
            }
            
            // Next button
            html += `<button onclick="loadProducts(${currentPage + 1})" class="btn btn-outline" style="padding: 0.5rem 1rem;" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button>`;
            
            container.innerHTML = html;
        }

        async function loadBusinesses() {
            try {
                console.log('Fetching businesses from backend...');
                const response = await fetch('http://localhost:5000/api/businesses');
                console.log('Businesses response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const businesses = await response.json();
                console.log('Loaded businesses:', businesses);
                console.log('Total businesses:', businesses.length);
                
                const select = document.getElementById('businessFilter');
                select.innerHTML = '<option value="">All Businesses</option>' + 
                    businesses.map(b => `<option value="${b._id}">${b.name}</option>`).join('');
                
                const categories = [...new Set(businesses.map(b => b.category))];
                const catSelect = document.getElementById('categoryFilter');
                catSelect.innerHTML = '<option value="">All Categories</option>' + 
                    categories.map(c => `<option value="${c}">${c.charAt(0).toUpperCase() + c.slice(1)}</option>`).join('');
            } catch (error) {
                console.error('Failed to load businesses:', error);
            }
        }

        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');
            document.getElementById('productCount').textContent = `${products.length} products found`;
            
            if (products.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; background: #f7fafc; border-radius: 12px;"><div style="font-size: 4rem; margin-bottom: 1rem;">📦</div><h3 style="margin-bottom: 0.5rem;">No products available</h3><p style="color: #718096;">Check back later for new products from local businesses</p></div>';
                return;
            }

            grid.innerHTML = products.map(product => {
                const businessName = product.business?.name || 'Unknown Business';
                const businessId = product.business?._id || product.business;
                
                return `
                <div class="product-card">
                    <div style="height: 180px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); position: relative;">
                        <img loading="lazy" src="${product.image}" alt="${product.name}" 
                             style="width: 100%; height: 100%; object-fit: cover;"
                             onerror="this.style.display='none'">
                        <span style="position: absolute; top: 0.75rem; right: 0.75rem; padding: 0.25rem 0.75rem; background: ${product.inStock ? '#d4edda' : '#f8d7da'}; color: ${product.inStock ? '#155724' : '#721c24'}; border-radius: 12px; font-size: 0.75rem; font-weight: 600;">
                            ${product.inStock ? '✓ In Stock' : '✗ Out of Stock'}
                        </span>
                    </div>
                    <div style="padding: 1.5rem;">
                        <div style="color: #718096; font-size: 0.75rem; margin-bottom: 0.5rem; text-transform: uppercase;">${businessName}</div>
                        <h3 style="font-size: 1.125rem; font-weight: 600; margin-bottom: 0.5rem;">${product.name}</h3>
                        <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                            <div style="display: flex; gap: 2px;">
                                ${[1,2,3,4,5].map(star => `<span style="color: ${star <= Math.round(product.rating || 0) ? '#fbbf24' : '#d1d5db'};">★</span>`).join('')}
                            </div>
                            <span style="font-size: 0.875rem; color: #718096;">${product.rating ? product.rating.toFixed(1) : '0.0'} (${product.reviewCount || 0})</span>
                        </div>
                        <p style="color: #4a5568; font-size: 0.875rem; margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${product.description}</p>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-size: 1.5rem; font-weight: 700; color: #8b5cf6;">₹${product.price}</span>
                            <button onclick='addToCart(${JSON.stringify(product).replace(/'/g, "&apos;")})' class="btn btn-primary" style="padding: 0.5rem 1rem;" ${!product.inStock ? 'disabled' : ''}>
                                ${product.inStock ? 'Add to Cart' : 'Unavailable'}
                            </button>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function filterProducts() {
            const businessId = document.getElementById('businessFilter').value;
            const category = document.getElementById('categoryFilter').value;
            const search = document.getElementById('searchProducts').value.toLowerCase();
            const minPrice = parseFloat(document.getElementById('minPrice').value) || 0;
            const maxPrice = parseFloat(document.getElementById('maxPrice').value) || Infinity;
            const stockFilter = document.getElementById('stockFilter').value;

            let filtered = allProducts;

            if (businessId) filtered = filtered.filter(p => p.business?._id === businessId || p.business === businessId);
            if (category) filtered = filtered.filter(p => p.business?.category === category);
            if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search) || p.description.toLowerCase().includes(search));
            if (minPrice > 0) filtered = filtered.filter(p => p.price >= minPrice);
            if (maxPrice < Infinity) filtered = filtered.filter(p => p.price <= maxPrice);
            if (stockFilter === 'in-stock') filtered = filtered.filter(p => p.inStock);
            if (stockFilter === 'out-of-stock') filtered = filtered.filter(p => !p.inStock);

            const sortBy = document.getElementById('sortSelect').value;
            if (sortBy === 'price-low') filtered.sort((a, b) => a.price - b.price);
            else if (sortBy === 'price-high') filtered.sort((a, b) => b.price - a.price);
            else if (sortBy === 'name') filtered.sort((a, b) => a.name.localeCompare(b.name));

            displayProducts(filtered);
        }

        function toggleAdvancedFilters() {
            const filters = document.getElementById('advancedFilters');
            filters.style.display = filters.style.display === 'none' ? 'block' : 'none';
        }

        function applyFilters() {
            filterProducts();
        }

        function clearFilters() {
            document.getElementById('minPrice').value = '';
            document.getElementById('maxPrice').value = '';
            document.getElementById('sortSelect').value = 'default';
            document.getElementById('stockFilter').value = '';
            document.getElementById('searchProducts').value = '';
            document.getElementById('businessFilter').value = '';
            document.getElementById('categoryFilter').value = '';
            displayProducts(allProducts);
        }

        function sortProducts() {
            filterProducts();
        }

        document.getElementById('searchProducts').addEventListener('input', filterProducts);
        document.getElementById('businessFilter').addEventListener('change', filterProducts);
        document.getElementById('categoryFilter').addEventListener('change', filterProducts);
        document.getElementById('sortSelect').addEventListener('change', filterProducts);

        function addToCart(product) {
            const existingItem = cart.find(item => item._id === product._id);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            
            toast.success(`${product.name} added to cart!`);
            
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '✓ Added!';
            btn.style.background = '#10b981';
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '';
            }, 1000);
        }

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
            document.getElementById('sidebarCartCount').textContent = count;
        }

        function openCart() {
            const cartItems = document.getElementById('cartItems');
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<div style="text-align: center; padding: 3rem; color: #718096;"><div style="font-size: 3rem; margin-bottom: 1rem;">🛒</div><p>Your cart is empty</p></div>';
            } else {
                cartItems.innerHTML = cart.map(item => `
                    <div style="display: flex; gap: 1rem; padding: 1rem; border-bottom: 1px solid #e2e8f0;">
                        <div style="width: 80px; height: 80px; border-radius: 8px; background: url(${item.image}) center/cover, linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>
                        <div style="flex: 1;">
                            <div style="font-weight: 600; margin-bottom: 0.25rem;">${item.name}</div>
                            <div style="color: #718096; font-size: 0.875rem; margin-bottom: 0.5rem;">₹${item.price} × ${item.quantity} = ₹${(item.price * item.quantity).toFixed(2)}</div>
                            <div style="display: flex; gap: 0.5rem; align-items: center;">
                                <button onclick="updateQuantity('${item._id}', -1)" style="width: 28px; height: 28px; border: 1px solid #e2e8f0; border-radius: 4px; background: white; cursor: pointer;">−</button>
                                <span style="min-width: 30px; text-align: center;">${item.quantity}</span>
                                <button onclick="updateQuantity('${item._id}', 1)" style="width: 28px; height: 28px; border: 1px solid #e2e8f0; border-radius: 4px; background: white; cursor: pointer;">+</button>
                                <button onclick="removeFromCart('${item._id}')" style="margin-left: auto; color: #e53e3e; background: none; border: none; cursor: pointer; font-size: 0.875rem;">Remove</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cartTotal').textContent = '₹' + total.toFixed(2);
            document.getElementById('cartModal').classList.add('active');
        }

        function closeCart() {
            document.getElementById('cartModal').classList.remove('active');
        }

        function updateQuantity(productId, change) {
            const item = cart.find(i => i._id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    localStorage.setItem('cart', JSON.stringify(cart));
                    updateCartCount();
                    openCart();
                }
            }
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item._id !== productId);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            openCart();
        }

        function checkout() {
            if (cart.length === 0) {
                toast.error('Your cart is empty');
                return;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const amountInPaise = Math.round(total * 100);

            const options = {
                key: 'rzp_test_ROyxiJCM3V8B7f',
                amount: amountInPaise,
                currency: 'INR',
                name: 'LocalBiz',
                description: 'Product Purchase',
                image: 'https://via.placeholder.com/100x100?text=LocalBiz',
                handler: async function (response) {
                    showLoading('Processing your order...');
                    await saveOrder(response.razorpay_payment_id, total);
                    hideLoading();
                    toast.success('🎉 Payment Successful! Thank you for your purchase!', 5000);
                    cart = [];
                    localStorage.setItem('cart', JSON.stringify(cart));
                    updateCartCount();
                    closeCart();
                },
                prefill: {
                    name: user.fullName || '',
                    email: user.email || '',
                    contact: user.phone || ''
                },
                theme: {
                    color: '#8b5cf6'
                },
                modal: {
                    ondismiss: function() {
                        console.log('Payment cancelled');
                    }
                }
            };

            const rzp = new Razorpay(options);
            rzp.on('payment.failed', function (response) {
                toast.error(`Payment Failed: ${response.error.description}`, 5000);
            });
            rzp.open();
        }

        async function saveOrder(paymentId, total) {
            const token = localStorage.getItem('token');
            try {
                console.log('Saving order:', { paymentId, total, items: cart });
                const response = await fetch('http://localhost:5000/api/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        items: cart.map(item => ({
                            product: item._id,
                            name: item.name,
                            price: item.price,
                            quantity: item.quantity
                        })),
                        total: total,
                        paymentId: paymentId,
                        status: 'completed'
                    })
                });
                
                if (response.ok) {
                    const order = await response.json();
                    console.log('Order saved successfully:', order);
                } else {
                    console.error('Failed to save order:', await response.text());
                }
            } catch (error) {
                console.error('Error saving order:', error);
            }
        }

        document.getElementById('cartModal').addEventListener('click', (e) => {
            if (e.target.id === 'cartModal') closeCart();
        });
    </script>
</body>
</html>
