<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - LocalBiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="toast.css">
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="dashboard-body">
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <div class="sidebar-header">
                <div class="logo">LocalBiz</div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span class="nav-text">Dashboard</span></a>
                <a href="dashboard-businesses.html" class="nav-item"><span class="nav-icon">🏢</span><span class="nav-text">Businesses</span></a>
                <a href="dashboard-analytics.html" class="nav-item"><span class="nav-icon">📈</span><span class="nav-text">Analytics</span></a>
                <a href="dashboard-products.html" class="nav-item active"><span class="nav-icon">🛍️</span><span class="nav-text">Products</span></a>
                <a href="dashboard-customers.html" class="nav-item"><span class="nav-icon">👥</span><span class="nav-text">Customers</span></a>
                <a href="dashboard-revenue.html" class="nav-item"><span class="nav-icon">💰</span><span class="nav-text">Revenue</span></a>
                <a href="dashboard-settings.html" class="nav-item"><span class="nav-icon">⚙️</span><span class="nav-text">Settings</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar" id="userAvatar">JD</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">John Doe</div>
                        <div class="user-role" id="userRole">Admin</div>
                    </div>
                </div>
                <a href="#" class="logout-btn" onclick="logout(); return false;">← Logout</a>
            </div>
        </aside>
        <main class="dashboard-main">
            <header class="dashboard-header">
                <div class="header-content">
                    <div class="header-title">
                        <h1>Products</h1>
                        <p>Manage your product catalog</p>
                    </div>
                    <div class="header-actions">
                        <button class="btn btn-primary" onclick="openAddModal()">+ Add Product</button>
                    </div>
                </div>
            </header>
            <div class="dashboard-content">
                <div id="productGrid" style="display: block;">
                    <div class="skeleton-card">
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-text"></div>
                        <div class="skeleton skeleton-text" style="width: 80%;"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">🌙</button>

    <!-- Add/Edit Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom: 1.5rem;">Add Product</h2>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Business *</label>
                    <select id="businessSelect" name="business" style="width: 100%; padding: 0.75rem; border: 2px solid #e2e8f0; border-radius: 8px;" required>
                        <option value="">Select a business</option>
                    </select>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Product Name *</label>
                    <input type="text" id="productName" name="name" style="width: 100%; padding: 0.75rem; border: 2px solid #e2e8f0; border-radius: 8px;" required>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Description *</label>
                    <textarea id="productDescription" name="description" style="width: 100%; padding: 0.75rem; border: 2px solid #e2e8f0; border-radius: 8px; min-height: 80px;" required></textarea>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                    <div>
                        <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Price *</label>
                        <input type="number" id="productPrice" name="price" step="0.01" style="width: 100%; padding: 0.75rem; border: 2px solid #e2e8f0; border-radius: 8px;" required>
                    </div>
                    <div>
                        <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Stock</label>
                        <input type="number" id="productStock" name="stock" style="width: 100%; padding: 0.75rem; border: 2px solid #e2e8f0; border-radius: 8px;">
                    </div>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Category *</label>
                    <input type="text" id="productCategory" name="category" style="width: 100%; padding: 0.75rem; border: 2px solid #e2e8f0; border-radius: 8px;" required>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Product Image</label>
                    <input type="file" id="productImageFile" accept="image/*" style="width: 100%; padding: 0.75rem; border: 2px solid #e2e8f0; border-radius: 8px;">
                    <input type="hidden" id="productImage" name="image">
                    <div id="imagePreview" style="margin-top: 0.5rem;"></div>
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem;">
                        <input type="checkbox" id="productInStock" name="inStock" checked>
                        <span>In Stock</span>
                    </label>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save Product</button>
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/theme.js"></script>
    <script>
        const user = checkAuth();
        if (!user) window.location.href = 'login.html';
        else {
            document.getElementById('userName').textContent = user.fullName || user.email;
            document.getElementById('userRole').textContent = user.role || 'User';
            document.getElementById('userAvatar').textContent = user.fullName ? user.fullName.split(' ').map(n => n[0]).join('').toUpperCase() : user.email[0].toUpperCase();
            loadProducts();
            loadBusinesses();
        }

        async function loadProducts() {
            const token = localStorage.getItem('token');
            const grid = document.getElementById('productGrid');
            
            try {
                const response = await fetch('http://localhost:5000/api/products/my-products', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const products = await response.json();
                console.log('Products loaded:', products);
                products.forEach(p => console.log('Product:', p.name, 'Business:', p.business));
                displayProducts(products);
            } catch (error) {
                grid.innerHTML = `
                    <div class="error-container">
                        <div class="error-icon">⚠️</div>
                        <div class="error-title">Failed to Load Products</div>
                        <div class="error-message">Unable to fetch products. Please check your connection.</div>
                        <div class="error-actions">
                            <button class="btn btn-primary" onclick="loadProducts()">Try Again</button>
                            <button class="btn btn-outline" onclick="window.location.reload()">Refresh Page</button>
                        </div>
                    </div>
                `;
            }
        }

        function displayProducts(products) {
            const grid = document.getElementById('productGrid');
            
            if (products.length === 0) {
                grid.innerHTML = `
                    <div style="text-align: center; padding: 4rem; background: #f7fafc; border-radius: 12px; grid-column: 1/-1;">
                        <div style="font-size: 4rem; margin-bottom: 1rem;">📦</div>
                        <h3 style="margin-bottom: 0.5rem;">No products yet</h3>
                        <p style="color: #718096; margin-bottom: 1.5rem;">Start adding products to your catalog</p>
                        <button class="btn btn-primary" onclick="openAddModal()">Add Your First Product</button>
                    </div>
                `;
                return;
            }

            // Group products by business
            const grouped = products.reduce((acc, product) => {
                const businessId = product.business?._id || product.business || 'unknown';
                const businessName = product.business?.name || 'Unknown Business';
                if (!acc[businessId]) {
                    acc[businessId] = { name: businessName, products: [] };
                }
                acc[businessId].products.push(product);
                return acc;
            }, {});

            grid.innerHTML = Object.entries(grouped).map(([businessId, data]) => `
                <div style="grid-column: 1/-1; margin-bottom: 2rem;">
                    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 2px solid #e2e8f0;">
                        <h2 style="font-size: 1.5rem; font-weight: 700; color: #1a202c;">🏢 ${data.name}</h2>
                        <span style="padding: 0.25rem 0.75rem; background: #667eea; color: white; border-radius: 12px; font-size: 0.875rem;">${data.products.length} products</span>
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;">
                        ${data.products.map(product => `
                            <div style="background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                                <div style="height: 180px; background: url(${product.image}) center/cover, linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>
                                <div style="padding: 1.5rem;">
                                    <h3 style="font-size: 1.125rem; font-weight: 600; margin-bottom: 0.5rem;">${product.name}</h3>
                                    <p style="color: #4a5568; font-size: 0.875rem; margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${product.description}</p>
                                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                                        <span style="font-size: 1.5rem; font-weight: 700; color: #667eea;">₹${product.price}</span>
                                        <span style="padding: 0.25rem 0.75rem; background: ${product.inStock ? '#d4edda' : '#f8d7da'}; color: ${product.inStock ? '#155724' : '#721c24'}; border-radius: 12px; font-size: 0.75rem;">${product.inStock ? 'In Stock' : 'Out of Stock'}</span>
                                    </div>
                                    <div style="display: flex; gap: 0.5rem;">
                                        <button class="btn btn-outline" style="flex: 1; padding: 0.5rem;" onclick='editProduct(${JSON.stringify(product)})'>Edit</button>
                                        <button class="btn btn-outline" style="padding: 0.5rem; color: #e53e3e;" onclick="deleteProduct('${product._id}')">Delete</button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        async function loadBusinesses() {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch('http://localhost:5000/api/businesses', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const businesses = await response.json();
                const select = document.getElementById('businessSelect');
                select.innerHTML = '<option value="">Select a business</option>' + 
                    businesses.map(b => `<option value="${b._id}">${b.name}</option>`).join('');
            } catch (error) {
                console.error('Failed to load businesses');
            }
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add Product';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('productModal').classList.add('active');
        }

        function editProduct(product) {
            document.getElementById('modalTitle').textContent = 'Edit Product';
            document.getElementById('productId').value = product._id;
            document.getElementById('businessSelect').value = product.business?._id || product.business;
            document.getElementById('productName').value = product.name;
            document.getElementById('productDescription').value = product.description;
            document.getElementById('productPrice').value = product.price;
            document.getElementById('productStock').value = product.stock;
            document.getElementById('productCategory').value = product.category;
            document.getElementById('productImage').value = product.image;
            document.getElementById('productInStock').checked = product.inStock;
            document.getElementById('productModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
        }

        // Handle image upload
        document.getElementById('productImageFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('image', file);
            const token = localStorage.getItem('token');

            try {
                document.getElementById('imagePreview').innerHTML = '<div class="spinner"></div> <span style="color: #718096; font-size: 0.875rem; margin-left: 0.5rem;">Uploading...</span>';
                
                const response = await fetch('http://localhost:5000/api/upload', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('productImage').value = data.url;
                    document.getElementById('imagePreview').innerHTML = `<img src="${data.url}" style="max-width: 200px; border-radius: 8px; border: 2px solid #e2e8f0;">`;
                    toast.success('Image uploaded successfully!');
                } else {
                    const error = await response.json();
                    console.error('Upload error:', error);
                    toast.error(error.message || 'Failed to upload image');
                    document.getElementById('imagePreview').innerHTML = '';
                }
            } catch (error) {
                toast.error('Error uploading image');
            }
        });

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            const productId = document.getElementById('productId').value;
            const btn = e.target.querySelector('button[type="submit"]');
            
            setButtonLoading(btn, true);

            const formData = new FormData(e.target);
            const data = {
                business: formData.get('business'),
                name: formData.get('name'),
                description: formData.get('description'),
                price: parseFloat(formData.get('price')),
                stock: parseInt(formData.get('stock')) || 0,
                category: formData.get('category'),
                image: formData.get('image'),
                inStock: document.getElementById('productInStock').checked
            };

            try {
                const url = productId 
                    ? `http://localhost:5000/api/products/${productId}`
                    : 'http://localhost:5000/api/products';
                
                const response = await fetch(url, {
                    method: productId ? 'PUT' : 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    toast.success(productId ? 'Product updated successfully!' : 'Product added successfully!');
                    closeModal();
                    loadProducts();
                } else {
                    toast.error('Failed to save product');
                }
            } catch (error) {
                toast.error('Error saving product');
            } finally {
                setButtonLoading(btn, false);
            }
        });

        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;

            showLoading('Deleting product...');
            const token = localStorage.getItem('token');
            try {
                await fetch(`http://localhost:5000/api/products/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                hideLoading();
                toast.success('Product deleted successfully!');
                loadProducts();
            } catch (error) {
                hideLoading();
                toast.error('Failed to delete product');
            }
        }

        // Close modal on outside click
        document.getElementById('productModal').addEventListener('click', (e) => {
            if (e.target.id === 'productModal') closeModal();
        });
    </script>
</body>
</html>
