<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Businesses - LocalBiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-body">
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <div class="sidebar-header">
                <div class="logo">LocalBiz</div>
                <button class="sidebar-toggle">☰</button>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">Dashboard</span>
                </a>
                <a href="dashboard-businesses.html" class="nav-item active">
                    <span class="nav-icon">🏢</span>
                    <span class="nav-text">Businesses</span>
                </a>
                <a href="dashboard-analytics.html" class="nav-item">
                    <span class="nav-icon">📈</span>
                    <span class="nav-text">Analytics</span>
                </a>
                <a href="dashboard-products.html" class="nav-item">
                    <span class="nav-icon">🛍️</span>
                    <span class="nav-text">Products</span>
                </a>
                <a href="dashboard-customers.html" class="nav-item">
                    <span class="nav-icon">👥</span>
                    <span class="nav-text">Customers</span>
                </a>
                <a href="dashboard-revenue.html" class="nav-item">
                    <span class="nav-icon">💰</span>
                    <span class="nav-text">Revenue</span>
                </a>
                <a href="dashboard-settings.html" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-text">Settings</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar" id="userAvatar">JD</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">John Doe</div>
                        <div class="user-role" id="userRole">Admin</div>
                    </div>
                </div>
                <a href="#" class="logout-btn" onclick="logout(); return false;">← Logout</a>
            </div>
        </aside>

        <main class="dashboard-main">
            <header class="dashboard-header">
                <div class="header-content">
                    <div class="header-title">
                        <h1>My Businesses</h1>
                        <p>Manage your registered businesses</p>
                    </div>
                    <div class="header-actions">
                        <a href="join.html" class="btn btn-primary" style="text-decoration: none;">+ Add Business</a>
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="business-list" id="businessList" style="display: grid; gap: 1.5rem;">
                    <div style="text-align: center; padding: 3rem;">
                        <p>Loading businesses...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Business Modal -->
    <div id="editModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: white; padding: 2rem; border-radius: 12px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto;">
            <h2 style="margin-bottom: 1.5rem;">Edit Business</h2>
            <form id="editForm">
                <input type="hidden" id="editBusinessId">
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Business Name *</label>
                    <input type="text" id="editName" required style="width: 100%; padding: 0.625rem 0.875rem; border: 1.5px solid #d4d4d4; border-radius: 0.75rem;">
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Category *</label>
                    <select id="editCategory" required style="width: 100%; padding: 0.625rem 0.875rem; border: 1.5px solid #d4d4d4; border-radius: 0.75rem;">
                        <option value="restaurant">Restaurant</option>
                        <option value="retail">Retail</option>
                        <option value="service">Service</option>
                        <option value="healthcare">Healthcare</option>
                        <option value="education">Education</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Description *</label>
                    <textarea id="editDescription" required style="width: 100%; padding: 0.625rem 0.875rem; border: 1.5px solid #d4d4d4; border-radius: 0.75rem; min-height: 80px;"></textarea>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Address *</label>
                    <input type="text" id="editAddress" required style="width: 100%; padding: 0.625rem 0.875rem; border: 1.5px solid #d4d4d4; border-radius: 0.75rem;">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                    <div>
                        <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Email *</label>
                        <input type="email" id="editEmail" required style="width: 100%; padding: 0.625rem 0.875rem; border: 1.5px solid #d4d4d4; border-radius: 0.75rem;">
                    </div>
                    <div>
                        <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Phone *</label>
                        <input type="tel" id="editPhone" required style="width: 100%; padding: 0.625rem 0.875rem; border: 1.5px solid #d4d4d4; border-radius: 0.75rem;">
                    </div>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">WhatsApp</label>
                    <input type="tel" id="editWhatsapp" style="width: 100%; padding: 0.625rem 0.875rem; border: 1.5px solid #d4d4d4; border-radius: 0.75rem;">
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Map Link</label>
                    <input type="url" id="editMapLink" style="width: 100%; padding: 0.625rem 0.875rem; border: 1.5px solid #d4d4d4; border-radius: 0.75rem;">
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Business Logo/Photo</label>
                    <input type="file" id="editBusinessImage" accept="image/*" style="width: 100%; padding: 0.625rem 0.875rem; border: 1.5px solid #d4d4d4; border-radius: 0.75rem;">
                    <input type="hidden" id="editBusinessImageUrl">
                    <div id="editBusinessImagePreview" style="margin-top: 0.5rem;"></div>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save Changes</button>
                    <button type="button" class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <style>
        #editModal.active {
            display: flex !important;
        }
        </main>
    </div>
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script src="js/auth.js"></script>
    <script>
        const user = checkAuth();
        if (!user) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('userName').textContent = user.fullName || user.email;
            document.getElementById('userRole').textContent = user.role || 'User';
            const initials = user.fullName ? user.fullName.split(' ').map(n => n[0]).join('').toUpperCase() : user.email[0].toUpperCase();
            document.getElementById('userAvatar').textContent = initials;
            loadBusinesses();
        }
        
        async function loadBusinesses() {
            const token = localStorage.getItem('token');
            const container = document.getElementById('businessList');
            container.innerHTML = '<div style="text-align: center; padding: 3rem;"><div style="display: inline-block; width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite;"></div><p style="margin-top: 1rem; color: #718096;">Loading businesses...</p></div>';
            
            try {
                const response = await fetch('http://localhost:5000/api/businesses', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) {
                    throw new Error('Failed to fetch businesses');
                }
                
                const businesses = await response.json();
                displayBusinesses(businesses);
            } catch (error) {
                if (error.name === 'TypeError' && error.message.includes('fetch')) {
                    container.innerHTML = '<div style="text-align: center; padding: 3rem; color: #e53e3e;"><p style="font-size: 2rem; margin-bottom: 1rem;">⚠️</p><p>Cannot connect to server</p><p style="font-size: 0.875rem; color: #718096; margin-top: 0.5rem;">Please check if the backend is running</p><button onclick="loadBusinesses()" class="btn btn-primary" style="margin-top: 1rem;">Retry</button></div>';
                } else {
                    container.innerHTML = '<div style="text-align: center; padding: 3rem; color: #e53e3e;"><p>Failed to load businesses</p><button onclick="loadBusinesses()" class="btn btn-primary" style="margin-top: 1rem;">Retry</button></div>';
                }
            }
        }
        
        function displayBusinesses(businesses) {
            const container = document.getElementById('businessList');
            
            if (businesses.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 3rem; background: #f7fafc; border-radius: 12px; border: 2px dashed #cbd5e0;">
                        <p style="color: #718096; margin-bottom: 1rem;">No businesses registered yet</p>
                        <a href="join.html" class="btn btn-primary">Register Your First Business</a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = businesses.map(business => `
                <div class="business-card" style="background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;">
                        <div>
                            <h3 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem;">${business.name}</h3>
                            <p style="color: #718096; margin-bottom: 1rem;">${business.category} • ${business.address}</p>
                            <p style="color: #4a5568; margin-bottom: 1rem; font-size: 0.875rem;">${business.description}</p>
                            <div style="display: flex; gap: 1rem; font-size: 0.875rem; margin-bottom: 1rem;">
                                <span>📧 ${business.email}</span>
                                <span>📞 ${business.phone}</span>
                            </div>
                            <div style="display: flex; gap: 0.5rem;">
                                ${business.whatsapp ? `<a href="https://wa.me/${business.whatsapp.replace(/\D/g,'')}" target="_blank" class="btn btn-outline" style="padding: 0.5rem 1rem; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;">
                                    <span style="font-size: 1.2rem;">💬</span> WhatsApp
                                </a>` : ''}
                                ${business.mapLink ? `<a href="${business.mapLink}" target="_blank" class="btn btn-outline" style="padding: 0.5rem 1rem; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;">
                                    <span style="font-size: 1.2rem;">📍</span> View Map
                                </a>` : ''}
                            </div>
                        </div>
                        <div style="display: flex; gap: 0.5rem;">
                            <button class="btn btn-outline" style="padding: 0.5rem 1rem;" onclick='editBusiness(${JSON.stringify(business)})'>Edit</button>
                            <button class="btn btn-outline" style="padding: 0.5rem 1rem; color: #e53e3e;" onclick="deleteBusiness('${business._id}')">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        async function deleteBusiness(id) {
            if (!confirm('Are you sure you want to delete this business?')) return;
            
            const token = localStorage.getItem('token');
            try {
                await fetch(`http://localhost:5000/api/businesses/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                loadBusinesses();
            } catch (error) {
                alert('Failed to delete business');
            }
        }
        
        function editBusiness(business) {
            document.getElementById('editBusinessId').value = business._id;
            document.getElementById('editName').value = business.name;
            document.getElementById('editCategory').value = business.category;
            document.getElementById('editDescription').value = business.description;
            document.getElementById('editAddress').value = business.address;
            document.getElementById('editEmail').value = business.email;
            document.getElementById('editPhone').value = business.phone;
            document.getElementById('editWhatsapp').value = business.whatsapp || '';
            document.getElementById('editMapLink').value = business.mapLink || '';
            document.getElementById('editBusinessImageUrl').value = business.image || '';
            
            // Show current image if exists
            if (business.image) {
                document.getElementById('editBusinessImagePreview').innerHTML = `<img src="${business.image}" style="max-width: 200px; border-radius: 8px; border: 2px solid #e2e8f0;">`;
            }
            
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            document.getElementById('editBusinessImagePreview').innerHTML = '';
        }

        // Handle business image upload in edit modal
        document.getElementById('editBusinessImage').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('image', file);
            const token = localStorage.getItem('token');

            try {
                document.getElementById('editBusinessImagePreview').innerHTML = '<div style="display: flex; align-items: center; gap: 0.5rem;"><div class="spinner"></div><span style="color: #718096; font-size: 0.875rem;">Uploading...</span></div>';
                
                const response = await fetch('http://localhost:5000/api/upload', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('editBusinessImageUrl').value = data.url;
                    document.getElementById('editBusinessImagePreview').innerHTML = `<img src="${data.url}" style="max-width: 200px; border-radius: 8px; border: 2px solid #e2e8f0;">`;
                } else {
                    alert('Failed to upload image');
                    document.getElementById('editBusinessImagePreview').innerHTML = '';
                }
            } catch (error) {
                alert('Error uploading image');
                document.getElementById('editBusinessImagePreview').innerHTML = '';
            }
        });

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            const businessId = document.getElementById('editBusinessId').value;
            
            const data = {
                name: document.getElementById('editName').value,
                category: document.getElementById('editCategory').value,
                description: document.getElementById('editDescription').value,
                address: document.getElementById('editAddress').value,
                email: document.getElementById('editEmail').value,
                phone: document.getElementById('editPhone').value,
                whatsapp: document.getElementById('editWhatsapp').value,
                mapLink: document.getElementById('editMapLink').value,
                image: document.getElementById('editBusinessImageUrl').value
            };

            try {
                const response = await fetch(`http://localhost:5000/api/businesses/${businessId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    closeEditModal();
                    loadBusinesses();
                } else {
                    alert('Failed to update business');
                }
            } catch (error) {
                alert('Error updating business');
            }
        });

        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target.id === 'editModal') closeEditModal();
        });
    </script>
</body>
</html>
