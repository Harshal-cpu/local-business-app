<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - LocalBiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-body">
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <div class="sidebar-header">
                <div class="logo">LocalBiz</div>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-text">Home</span>
                </a>
                <a href="customer-dashboard.html" class="nav-item">
                    <span class="nav-icon">🛍️</span>
                    <span class="nav-text">Shop Products</span>
                </a>
                <a href="order-history.html" class="nav-item active">
                    <span class="nav-icon">📦</span>
                    <span class="nav-text">My Orders</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar" id="userAvatar">C</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Customer</div>
                        <div class="user-role">Customer</div>
                    </div>
                </div>
                <a href="#" class="logout-btn" onclick="logout(); return false;">← Logout</a>
            </div>
        </aside>

        <main class="dashboard-main">
            <header class="dashboard-header">
                <div class="header-content">
                    <div class="header-title">
                        <h1>Order History</h1>
                        <p>View all your past orders</p>
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <div id="ordersContainer">
                    <div style="text-align: center; padding: 3rem;">
                        <p style="color: #718096;">Loading orders...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const user = checkAuth();
        if (!user) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('userName').textContent = user.fullName || user.email;
            const initials = user.fullName ? user.fullName.split(' ').map(n => n[0]).join('').toUpperCase() : user.email[0].toUpperCase();
            document.getElementById('userAvatar').textContent = initials;
            loadOrders();
        }

        async function loadOrders() {
            const token = localStorage.getItem('token');
            const container = document.getElementById('ordersContainer');

            try {
                const response = await fetch('http://localhost:5000/api/orders/my-orders', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to fetch orders');

                const orders = await response.json();
                console.log('Orders:', orders);

                if (orders.length === 0) {
                    container.innerHTML = `
                        <div style="text-align: center; padding: 4rem; background: #f7fafc; border-radius: 12px;">
                            <div style="font-size: 4rem; margin-bottom: 1rem;">📦</div>
                            <h3 style="margin-bottom: 0.5rem;">No orders yet</h3>
                            <p style="color: #718096; margin-bottom: 1.5rem;">Start shopping to see your orders here</p>
                            <a href="customer-dashboard.html" class="btn btn-primary" style="text-decoration: none;">Browse Products</a>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = orders.map(order => `
                    <div style="background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #e2e8f0;">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;">
                            <div>
                                <h3 style="font-size: 1.125rem; font-weight: 600; margin-bottom: 0.5rem;">Order #${order._id.slice(-8)}</h3>
                                <p style="color: #718096; font-size: 0.875rem;">${new Date(order.createdAt).toLocaleDateString('en-IN', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</p>
                            </div>
                            <span class="badge badge-success">${order.status}</span>
                        </div>
                        <div style="border-top: 1px solid #e2e8f0; padding-top: 1rem;">
                            ${order.items.map(item => `
                                <div style="display: flex; justify-content: space-between; padding: 0.5rem 0;">
                                    <span style="color: #4a5568;">${item.name} × ${item.quantity}</span>
                                    <span style="font-weight: 600;">₹${(item.price * item.quantity).toFixed(2)}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div style="border-top: 2px solid #e2e8f0; margin-top: 1rem; padding-top: 1rem; display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-weight: 600; font-size: 1.125rem;">Total</span>
                            <span style="font-weight: 700; font-size: 1.5rem; color: #8b5cf6;">₹${order.total.toFixed(2)}</span>
                        </div>
                        ${order.paymentId ? `<p style="color: #718096; font-size: 0.75rem; margin-top: 0.5rem;">Payment ID: ${order.paymentId}</p>` : ''}
                    </div>
                `).join('');
            } catch (error) {
                console.error('Failed to load orders:', error);
                container.innerHTML = `
                    <div style="text-align: center; padding: 4rem; color: #e53e3e;">
                        <p>Failed to load orders</p>
                        <p style="font-size: 0.875rem; margin-top: 0.5rem;">${error.message}</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
